<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Phrasebook.js - Dialogues in different languages</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href='https://fonts.googleapis.com/css?family=Montserrat' rel='stylesheet'>
    <link rel="stylesheet" href="assets/css/w5.css">
  </head>
  <body class="w5-flex-column">
    <header class="w5-header w5-flex-center w5-theme-header">
      <div class="w5-flex-adaptive w5-container w5-header-container">
        <select id="select-dialog" class="w5-select-dialogs w5-theme-header"></select>
        <div class="w5-flex">
          <select id="select-lang-first" class="w5-select-lang w5-theme-request">
            <option value="en">English</option>
            <option value="sr-lat">Serbian (lat)</option>
            <option value="sr-cyr">Serbian (cyr)</option>
            <option value="ru">Russian</option>
          </select>
          <svg id="svg-translate" xmlns="http://www.w3.org/2000/svg" height="24" width="24" viewBox="0 96 960 960" fill="#ffffff">
            <path d="M271 936 80 745l192-192 42 42-120 120h649v60H194l119 119-42 42Zm418-337-42-42 119-119H117v-60h649L646 258l42-42 192 192-191 191Z"/>
          </svg>
          <select id="select-lang-second" class="w5-select-lang w5-theme-response">
            <option value="en">English</option>
            <option value="sr-lat">Serbian (lat)</option>
            <option value="sr-cyr">Serbian (cyr)</option>
            <option value="ru">Russian</option>
          </select>
        </div>
      </div>    
    </header>

    <!-- PhraseBook.audioElement -->
    <div id="audio" class="w5-margin-10"></div>
    
    <!-- PhraseBook.dialogElement -->  
    <main id="dialog" class="w5-container"></main>

    <!-- PhraseBook.dialogRowTemplate -->
    <template id="dialog-row">
      <div class="w5-flex-adaptive w5-margin-10">
        <div class="w5-width-100">
          <div class="w5-flex">
            <p class="w5-text w5-text-request w5-theme-request"> 
            </p>
          </div>
        </div>
        <div class="w5-width-100">
          <div class="w5-flex">
            <p class="w5-text w5-text-response w5-theme-response"> 
            </p>
          </div>
        </div>
      </div>
    </template>

    <footer class="w5-footer">
      <a href="https://github.com/komarowski/komarowski.github.io" class="w5-flex w5-footer-text">
        Phrasebook.js&nbsp;&nbsp;

        </svg>
      </a>
    </footer>

    <!-- <script src="assets/js/data.js"></script> -->
    <script src="assets/js/phraseBook.js"></script>
    <script src="assets/js/main.js"></script>
  </body>
</html>
